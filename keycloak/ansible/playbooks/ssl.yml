- name: "Roll SSL certificate and private key for keycloak"
  vars_files:
    - vars/prod.yml
  gather_facts: no
  hosts: kamatera
  remote_user: "{{remote_admin}}"
  become: true
  become_method: sudo
  tasks:
    - name: Copy ssl certificate for keycloak
      copy:
        remote_src: true
        src: /etc/letsencrypt/live/113-30-190-16.cloud-xip.com/fullchain.pem
        dest: /opt/keycloak-26.4.7
        owner: keycloak
        group: keycloak

    - name: Copy ssl private key for keycloak
      copy:
        remote_src: true
        src: /etc/letsencrypt/live/113-30-190-16.cloud-xip.com/privkey.pem
        dest: /opt/keycloak-26.4.7
        owner: keycloak
        group: keycloak

    - name: Restart service keycloak.service
      systemd:
        state: restarted
        name: keycloak.service

    - name: Playbook completed successfully
      debug:
        msg: Playbook completed successfully