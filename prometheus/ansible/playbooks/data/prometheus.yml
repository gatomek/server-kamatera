global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"
    # metrics_path defaults to '/metrics'
    scheme: https
    static_configs:
      - targets: ["113-30-190-16.cloud-xip.com:9090"]
       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
        labels:
          app: "prometheus"

  - job_name: "radar-collector"
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/fullchain.pem
    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ["113-30-190-16.cloud-xip.com:12000"]
        labels:
          app: "radar-collector"

  - job_name: 'blackbox-https-monitoring'
    scheme: https
    scrape_timeout: 15s
    scrape_interval: 15s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://challenge-flightradar-gatomek.netlify.app
          - https://113-30-190-16.cloud-xip.com:8443
          - https://113-30-190-16.cloud-xip.com:3000
          - https://113-30-190-16.cloud-xip.com:12000/actuator/health
          - https://113-30-190-16.cloud-xip.com:9090
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 113-30-190-16.cloud-xip.com:9115