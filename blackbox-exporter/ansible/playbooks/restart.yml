- name: "Restart Blackbox"
  vars_files:
    - vars/prod.yml
  gather_facts: no
  hosts: castle
  remote_user: "{{remote_admin}}"
  become: true
  become_method: sudo
  tasks:
    - name: "Restart service {{app_name}}"
      systemd:
        name: "{{app_name}}"
        state: restarted
        enabled: true